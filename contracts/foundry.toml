[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc = "0.8.24"
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[rpc_endpoints]
skale_base_testnet = "https://base-sepolia-testnet.skalenodes.com/v1/jubilant-horrible-ancha"
skale_base_mainnet = "https://skale-base.skalenodes.com/v1/base"

[etherscan]
